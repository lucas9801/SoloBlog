      <stop offset="0" stop-color="#ffaf61"/>
      <stop offset=".52" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#46d7bf" stop-opacity=".62"/>
    </linearGradient>
    <radialGradient id="sphere" cx=".34" cy=".25" r=".74">
      <stop offset="0" stop-color="#fff"/>
      <stop offset=".38" stop-color="#46d7bf"/>
      <stop offset="1" stop-color="#17243a"/>
    </radialGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0v54" fill="none" stroke="#17243a" stroke-opacity=".12"/>
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#17243a" flood-opacity=".18"/>
