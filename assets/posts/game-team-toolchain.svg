      <circle cx="895" cy="372" r="112" fill="#46d7bf" opacity=".86"/>
      <path d="M760 300h105M840 260l82 72-82 72" fill="none" stroke="#fff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
