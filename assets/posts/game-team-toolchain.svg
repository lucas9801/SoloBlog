    <text x="78" y="190" fill="#eef6ff" font-size="58" font-weight="900" font-family="Microsoft YaHei, PingFang SC, Arial">小团队游戏项目的工具链原则</text>
    <text x="82" y="365" fill="#52647e" font-size="24" font-weight="650" font-family="Microsoft YaHei, PingFang SC, Arial">工具链的价值不在复杂，而在减少重复劳动、降低人为</text><text x="82" y="399" fill="#52647e" font-size="24" font-weight="650" font-family="Microsoft YaHei, PingFang SC, Arial">错误，并让关键流程可以被复现。</text>
    <rect x="82" y="500" width="94" height="34" rx="17" fill="#fff" opacity=".72"/>
    <text x="99" y="523" fill="#17243a" font-size="16" font-weight="800" font-family="Microsoft YaHei, PingFang SC, Arial">工具链</text><rect x="198" y="500" width="94" height="34" rx="17" fill="#fff" opacity=".72"/>
    <text x="215" y="523" fill="#17243a" font-size="16" font-weight="800" font-family="Microsoft YaHei, PingFang SC, Arial">自动化</text><rect x="314" y="500" width="94" height="34" rx="17" fill="#fff" opacity=".72"/>
    <text x="331" y="523" fill="#17243a" font-size="16" font-weight="800" font-family="Microsoft YaHei, PingFang SC, Arial">工程效率</text>
  </g>
  <text x="1080" y="612" text-anchor="end" fill="#17243a" font-size="13" font-weight="800" opacity=".34" font-family="Arial">SOLUS 3db344d49984</text>
